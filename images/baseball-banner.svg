<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-label="Baseball stadium banner illustration">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10263f"/>
      <stop offset="0.55" stop-color="#163b57"/>
      <stop offset="1" stop-color="#0c2f2c"/>
    </linearGradient>
    <linearGradient id="grass" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d5b38"/>
      <stop offset="0.5" stop-color="#198754"/>
      <stop offset="1" stop-color="#0e6b43"/>
    </linearGradient>
    <radialGradient id="lightGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.75"/>
      <stop offset="0.3" stop-color="#fff7d0" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grassStripes" width="140" height="520" patternUnits="userSpaceOnUse" patternTransform="skewX(-18)">
      <rect width="70" height="520" fill="rgba(255,255,255,0.05)"/>
      <rect x="70" width="70" height="520" fill="rgba(0,0,0,0.035)"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <rect width="1600" height="520" fill="url(#sky)"/>

  <!-- stadium crowd bands -->
  <path d="M0 230 C220 175 430 205 610 182 C850 150 1035 170 1240 142 C1395 120 1510 132 1600 112 L1600 305 L0 315 Z" fill="#20324a" opacity="0.92"/>
  <path d="M0 270 C260 218 470 238 680 213 C910 188 1100 196 1320 168 C1450 150 1540 158 1600 145 L1600 336 L0 348 Z" fill="#111827" opacity="0.92"/>
  <g opacity="0.5">
    <rect x="35" y="235" width="42" height="8" rx="4" fill="#f8f9fa"/>
    <rect x="112" y="250" width="34" height="8" rx="4" fill="#dc3545"/>
    <rect x="180" y="225" width="50" height="8" rx="4" fill="#ffc107"/>
    <rect x="275" y="240" width="38" height="8" rx="4" fill="#0d6efd"/>
    <rect x="380" y="222" width="52" height="8" rx="4" fill="#f8f9fa"/>
    <rect x="495" y="236" width="35" height="8" rx="4" fill="#198754"/>
    <rect x="650" y="210" width="46" height="8" rx="4" fill="#f8f9fa"/>
    <rect x="760" y="199" width="40" height="8" rx="4" fill="#dc3545"/>
    <rect x="890" y="195" width="56" height="8" rx="4" fill="#ffc107"/>
    <rect x="1010" y="198" width="42" height="8" rx="4" fill="#f8f9fa"/>
    <rect x="1160" y="177" width="52" height="8" rx="4" fill="#0d6efd"/>
    <rect x="1310" y="154" width="40" height="8" rx="4" fill="#f8f9fa"/>
    <rect x="1450" y="147" width="54" height="8" rx="4" fill="#dc3545"/>
  </g>

  <!-- lights -->
  <g opacity="0.95">
    <rect x="120" y="60" width="12" height="230" fill="#8a9aac"/>
    <rect x="84" y="42" width="84" height="42" rx="8" fill="#dbe7f3"/>
    <circle cx="98" cy="63" r="7" fill="#fff7d0"/>
    <circle cx="118" cy="63" r="7" fill="#fff7d0"/>
    <circle cx="138" cy="63" r="7" fill="#fff7d0"/>
    <circle cx="158" cy="63" r="7" fill="#fff7d0"/>
    <circle cx="126" cy="64" r="105" fill="url(#lightGlow)"/>

    <rect x="1345" y="35" width="12" height="235" fill="#8a9aac"/>
    <rect x="1308" y="18" width="86" height="44" rx="8" fill="#dbe7f3"/>
    <circle cx="1322" cy="40" r="7" fill="#fff7d0"/>
    <circle cx="1342" cy="40" r="7" fill="#fff7d0"/>
    <circle cx="1362" cy="40" r="7" fill="#fff7d0"/>
    <circle cx="1382" cy="40" r="7" fill="#fff7d0"/>
    <circle cx="1352" cy="42" r="115" fill="url(#lightGlow)"/>
  </g>

  <!-- field -->
  <path d="M0 305 C300 255 540 275 800 252 C1075 228 1300 248 1600 195 L1600 520 L0 520 Z" fill="url(#grass)"/>
  <path d="M0 305 C300 255 540 275 800 252 C1075 228 1300 248 1600 195 L1600 520 L0 520 Z" fill="url(#grassStripes)" opacity="0.8"/>

  <!-- infield diamond -->
  <g filter="url(#softShadow)" transform="translate(1080 350) rotate(-8)">
    <path d="M0 95 L155 0 L310 95 L155 190 Z" fill="#b56a35" opacity="0.92"/>
    <path d="M155 25 L280 95 L155 165 L30 95 Z" fill="#9f552a" opacity="0.72"/>
    <path d="M155 179 L178 193 L155 207 L132 193 Z" fill="#f5f2ea"/>
    <rect x="151" y="86" width="9" height="9" fill="#f5f2ea" transform="rotate(45 155 90)"/>
    <rect x="25" y="91" width="9" height="9" fill="#f5f2ea" transform="rotate(45 30 95)"/>
    <rect x="276" y="91" width="9" height="9" fill="#f5f2ea" transform="rotate(45 280 95)"/>
  </g>

  <!-- baseball close-up -->
  <g transform="translate(1260 275) rotate(-18)" opacity="0.96" filter="url(#softShadow)">
    <circle cx="0" cy="0" r="92" fill="#f7f1e5"/>
    <path d="M-48 -80 C-12 -46 4 -12 -6 44 C-10 66 -2 84 12 99" fill="none" stroke="#c22b3a" stroke-width="7" stroke-linecap="round"/>
    <path d="M46 -83 C18 -45 8 -8 22 42 C28 64 22 84 6 99" fill="none" stroke="#c22b3a" stroke-width="7" stroke-linecap="round"/>
    <g stroke="#c22b3a" stroke-width="3" stroke-linecap="round">
      <path d="M-42 -66 l-15 6"/><path d="M-31 -49 l-15 8"/><path d="M-21 -30 l-16 7"/><path d="M-14 -9 l-17 5"/><path d="M-13 13 l-17 3"/><path d="M-17 35 l-16 2"/>
      <path d="M42 -67 l15 6"/><path d="M31 -50 l15 7"/><path d="M24 -30 l16 6"/><path d="M24 -8 l17 4"/><path d="M29 15 l17 2"/><path d="M31 37 l16 1"/>
    </g>
  </g>

  <!-- subtle foul lines -->
  <path d="M1110 443 L1600 230" stroke="#f8f0df" stroke-width="4" opacity="0.55"/>
  <path d="M1110 443 L815 520" stroke="#f8f0df" stroke-width="4" opacity="0.45"/>
</svg>
