<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UTI Home Run Pool</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="../styles/styles.css" />
  <link rel="stylesheet" href="../styles/home-run-pool.css" />
</head>
<body>
  <main class="page">
    <a class="back-link" href="../index.html">← Back to UTI Hub</a>

    <section class="hero">
      <div class="kicker">Season-Long Side Bet</div>
      <h1>Home Run Pool</h1>
      <p class="deck">
        Each team has four drafted hitters. Totals update from MLB season stats and the standings sort by most home runs.
      </p>
      <p class="last-updated" id="homeRunPoolUpdatedAt">Loading...</p>
    </section>

    <section class="section-card" id="home-run-pool">
      <div class="section-heading">
        <div>
          <h2 class="section-title">Full Standings</h2>
          <p class="section-subtitle">Live season HR totals for every Home Run Pool team.</p>
        </div>
      </div>

      <div class="home-run-pool-grid" id="homeRunPoolGrid">
        <article class="article-card">
          <p class="article-summary">Loading Home Run Pool...</p>
        </article>
      </div>
    </section>
  </main>

  <script src="../data/homerun-pool.js"></script>
  <script src="../scripts/homerun-pool.js"></script>
</body>
</html>
